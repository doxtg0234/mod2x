<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">

<title>Browser Verification — MovieBox</title>

<meta name="description" content="Please wait while we verify your browser before continuing to MovieBox. This process only takes a few seconds.">

<link rel="canonical" href="https://moviebox.garden/verify">

<link rel="icon" href="/favicon.ico">

<style>
html{scroll-behavior:smooth;}
</style>

</head>

<body class="bg-black text-gray-200 flex items-center justify-center min-h-screen font-sans">

<div class="text-center space-y-6 max-w-md px-6">

<!-- Loader -->

<svg class="w-16 h-16 mx-auto text-white animate-spin"
xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24">

<circle
class="opacity-25"
cx="12"
cy="12"
r="10"
stroke="currentColor"
stroke-width="4">
</circle>

<path
class="opacity-75"
fill="currentColor"
d="M4 12a8 8 0 018-8v8H4z">
</path>

</svg>

<h1 class="text-2xl font-bold text-white">
Verifying your browser
</h1>

<p class="text-gray-400">
Please wait <span id="seconds">10</span> seconds while we check your connection.
</p>

<button id="continueBtn"
class="hidden mt-4 bg-white text-black px-6 py-2 rounded-full font-semibold hover:bg-gray-300 transition">
Continue
</button>

</div>

<script>

const redirectURL = "https://moviebox.garden";
let timeLeft = 10;

const secondsSpan = document.getElementById("seconds");
const continueBtn = document.getElementById("continueBtn");

secondsSpan.textContent = timeLeft;

const countdown = setInterval(() => {

timeLeft--;
secondsSpan.textContent = timeLeft;

if(timeLeft <= 0){

clearInterval(countdown);

continueBtn.classList.remove("hidden");

window.location.href = redirectURL;

}

},1000);

continueBtn.onclick = function(){
window.location.href = redirectURL;
}

</script>
<script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
</body>
</html>
